name: Test, lint & publish packages from mono-repo

# run testing and linting pipeline…
on:
  # on pull requests
  pull_request:
  # when main branch is updated
  push:
    branches:
      - main
  # and manually
  workflow_dispatch:

# cancel builds when PR is updated
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup node ${{ matrix.node }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node }}
      - name: Update npm
        run: npm install -g npm@11.11.1
      - name: Install dependencies
        run: npm install
      - name: Test build step
        run: npm run build
      - name: Run unit tests
        run: npm test

  lint:
    name: Run linting checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm install
      - name: Clean build step
        run: npm run clean
      - name: Test build step
        run: npm run build
      - name: Run linting checks
        run: npm run lint

  publish:
    name: Version or publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    needs:
      - test
      - lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup node with public npmjs.com registry
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          scope: '@ministryofjustice'
      - name: Install dependencies
        run: npm install
      - name: Create release pull request or publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: Version Packages
          commit: Version Packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
