version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "/"
      - "/packages/*"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - ">=25"
    cooldown:
      default-days: 7
      exclude:
        - "@ministryofjustice/*"
    schedule:
      interval: weekly
      day: wednesday
    groups:
      development:
        dependency-type: "development"

  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
      exclude:
        - "ministryofjustice/*"
    schedule:
      interval: weekly
      day: wednesday
